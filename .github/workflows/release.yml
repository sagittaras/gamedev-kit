name: Release

on:
  push:
    tags:
      - '*.*.*'

jobs:
  make-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Restore & Build
        working-directory: srcs/csharp
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
      
      - name: Collect Artifacts
        working-directory: srcs/csharp
        run: |
          mkdir -p ../../artifacts
          find . -path "*/bin/Release/netstandard2.1/*.dll" \
            ! -name "*.Tests.dll" \
            -exec cp {} ../../artifacts/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.dll
          generate_release_notes: true
          draft: true